services:
  # Backend API Service
  - type: web
    name: qatar-foundation-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: qatar-foundation-db
          property: connectionString
      - key: FLASK_ENV
        value: production

databases:
  - name: qatar-foundation-db
    databaseName: qatar_foundation
    user: admin
